<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; cursor: pointer; }
.hand {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%) translateY(-40px);
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(1px 1px 0 #111);
}
.hand.show  { opacity: 1; transform: translateX(-50%) translateY(-40px); transition: opacity 0.05s; }
.hand.press { opacity: 1; transform: translateX(-50%) translateY(4px);   transition: transform 0.15s ease-in; }
.hand.lift  { opacity: 1; transform: translateX(-50%) translateY(-40px); transition: transform 0.2s ease-out; }
.hand.hide  { opacity: 0; transform: translateX(-50%) translateY(-40px); transition: opacity 0.1s; }
</style>
</head>
<body>
<div class="hand" id="hand">
  <svg viewBox="0 0 14 20" width="28" height="40" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="0" width="4" height="10" fill="white" stroke="#111" stroke-width="0.7"/>
    <rect x="2" y="9"  width="10" height="11" fill="white" stroke="#111" stroke-width="0.7" rx="1"/>
  </svg>
</div>
<script>
const hand = document.getElementById('hand');
let busy = false;
document.addEventListener('click', () => {
  if (busy) return;
  busy = true;
  hand.className = 'hand show';
  setTimeout(() => { hand.className = 'hand press'; }, 10);
  setTimeout(() => { hand.className = 'hand lift'; }, 310);
  setTimeout(() => { hand.className = 'hand hide'; }, 560);
  setTimeout(() => { hand.className = 'hand'; busy = false; }, 650);
  window.patAPI.sendPat();
});
</script>
</body>
</html>
